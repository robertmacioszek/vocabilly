<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabilly</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app" class="card">
        <h1>Vocabilly</h1>
        <div id="progress">Fortschritt: 0/0</div>

        <section id="auth-box">
            <h3>Supabase Login</h3>
            <label for="supabase-url-input">Supabase URL:</label>
            <input type="text" id="supabase-url-input" placeholder="https://xxxxx.supabase.co">
            <label for="supabase-key-input">Supabase Anon Key:</label>
            <input type="password" id="supabase-key-input" placeholder="Anon Key">
            <label for="email-input">E-Mail:</label>
            <input type="text" id="email-input" placeholder="user@example.com">
            <label for="password-input">Passwort:</label>
            <input type="password" id="password-input" placeholder="Passwort">
            <div class="row">
                <button id="login-btn" class="btn full">Anmelden</button>
            </div>
            <div class="row">
                <button id="load-sessions-btn" class="btn full secondary" disabled>Sessions laden</button>
                <button id="logout-btn" class="btn full secondary" disabled>Abmelden</button>
            </div>
            <div id="auth-status" class="status">Nicht angemeldet</div>
        </section>

        <section id="sessions-list" style="margin-bottom:24px;">
            <h3>Verfuegbare Sessions</h3>
            <ul id="sessions-ul" style="list-style:none; padding:0;"></ul>
        </section>

        <div id="training-session" style="display:none;">
            <div id="card">
                <div id="word" style="font-size:1.4em; margin:24px 0; text-align:center;"></div>
                <input type="text" id="user-input" placeholder="Uebersetzung eingeben (optional)">
                <button id="show-answer" class="btn full" style="margin-bottom:12px;">Antwort zeigen</button>
                <div id="answer-buttons" style="display:flex; justify-content:space-between; margin-bottom:16px;">
                    <button id="btn-correct" class="btn">Richtig</button>
                    <button id="btn-wrong" class="btn">Falsch</button>
                </div>
                <div id="feedback" style="text-align:center; min-height:24px; font-size:1em;"></div>
                <button id="cancel-session" class="btn full secondary">Session beenden</button>
            </div>
        </div>

        <div id="session-end" style="display:none;">
            <h2>Training abgeschlossen!</h2>
            <div id="final-score"></div>
            <button id="restart-btn" class="btn full">Nochmal ueben</button>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
