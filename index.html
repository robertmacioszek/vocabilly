<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabilly</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app" class="card">
        <h1>Vocabilly</h1>
        <div id="progress">Fortschritt: 0/0</div>

        <section id="auth-box" data-view="login">
            <h3>Supabase Login</h3>
            <label for="supabase-url-input">Supabase URL:</label>
            <input type="text" id="supabase-url-input" placeholder="https://xxxxx.supabase.co">
            <label for="supabase-key-input">Supabase Anon Key:</label>
            <input type="password" id="supabase-key-input" placeholder="Anon Key">
            <label for="email-input">E-Mail:</label>
            <input type="text" id="email-input" placeholder="user@example.com">
            <label for="password-input">Passwort:</label>
            <input type="password" id="password-input" placeholder="Passwort">
            <div class="row">
                <button id="login-btn" class="btn full">Anmelden</button>
            </div>
            <div class="row">
                <button id="load-sessions-btn" class="btn full secondary" disabled>Sessions laden</button>
            </div>
            <div id="auth-status" class="status">Nicht angemeldet</div>
        </section>

        <section id="sessions-list" data-view="sessions" style="margin-bottom:24px;">
            <div class="row" style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0;">Verfuegbare Sessions</h3>
                <button id="logout-btn" class="btn btn-small secondary">Abmelden</button>
            </div>
            <ul id="sessions-ul" style="list-style:none; padding:0;"></ul>
            <button id="start-selected-sessions-btn" class="btn full" disabled>Session(s) starten</button>
        </section>

        <section id="admin-panel" data-view="admin" style="display:none; margin-bottom:24px;">
            <h3>Admin: Session pflegen</h3>
            <label for="admin-session-name-input">Session-Name:</label>
            <input type="text" id="admin-session-name-input" placeholder="z. B. U1-IN">

            <label for="admin-existing-session-select">Bestehende Session laden:</label>
            <select id="admin-existing-session-select">
                <option value="">Bitte waehlen</option>
            </select>
            <button id="admin-load-session-btn" class="btn full secondary">In Editor laden</button>
            <button id="admin-delete-session-btn" class="btn full secondary">Ausgewaehlte Session loeschen</button>

            <label for="admin-json-input">Vokabeln (JSON Array):</label>
            <textarea
                id="admin-json-input"
                rows="10"
                placeholder='[{"lesson":"U1","section":"IN","de":"unterwegs","en":"on the move"}]'></textarea>

            <button id="admin-save-session-btn" class="btn full">Session speichern/aktualisieren</button>
            <button id="admin-save-grouped-btn" class="btn full secondary">Aus JSON nach lesson-section gruppieren und speichern</button>
            <div id="admin-status" class="status">Adminbereich nicht aktiv</div>
        </section>

        <div id="training-session" style="display:none;">
            <div id="card">
                <div id="word" style="font-size:1.4em; margin:24px 0; text-align:center;"></div>
                <input type="text" id="user-input" placeholder="Uebersetzung eingeben (optional)">
                <button id="show-answer" class="btn full" style="margin-bottom:12px;">Antwort zeigen</button>
                <div id="answer-buttons" style="display:flex; justify-content:space-between; margin-bottom:16px;">
                    <button id="btn-correct" class="btn">Richtig</button>
                    <button id="btn-wrong" class="btn">Falsch</button>
                </div>
                <div id="feedback" style="text-align:center; min-height:24px; font-size:1em;"></div>
                <button id="cancel-session" class="btn full secondary">Session beenden</button>
            </div>
        </div>

        <div id="session-end" style="display:none;">
            <h2>Training abgeschlossen!</h2>
            <div id="final-score"></div>
            <button id="restart-btn" class="btn full">Nochmal ueben</button>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
